name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: crm
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_ci_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U crm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Generate Prisma client
        working-directory: packages/bff
        run: npx prisma generate

      - name: Run BFF tests
        working-directory: packages/bff
        env:
          DATABASE_URL: postgresql://crm:crm_ci_password@localhost:5432/crm
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: pnpm test

      - name: Build BFF
        working-directory: packages/bff
        run: pnpm build

      - name: Build Frontend
        working-directory: packages/frontend
        run: pnpm build

  perf-sla:
    runs-on: ubuntu-latest
    needs: lint-and-test
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: crm
          POSTGRES_USER: crm
          POSTGRES_PASSWORD: crm_ci_password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U crm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: packages/bff
        run: npx prisma generate

      - name: Run migrations
        working-directory: packages/bff
        env:
          DATABASE_URL: postgresql://crm:crm_ci_password@localhost:5432/crm
        run: npx prisma migrate deploy

      - name: Seed perf data
        working-directory: packages/bff
        env:
          DATABASE_URL: postgresql://crm:crm_ci_password@localhost:5432/crm
        run: npx ts-node k6/seed.ts

      - name: Build BFF
        working-directory: packages/bff
        run: pnpm build

      - name: Start BFF server
        working-directory: packages/bff
        env:
          DATABASE_URL: postgresql://crm:crm_ci_password@localhost:5432/crm
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          SUI_DRY_RUN: "true"
          NODE_ENV: test
          PORT: 3001
        run: node dist/main &

      - name: Wait for BFF health
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "BFF is ready"
              exit 0
            fi
            sleep 2
          done
          echo "BFF failed to start"
          exit 1

      - name: Run k6 SLA test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: packages/bff/k6/profile-sla.js
          flags: --env BASE_URL=http://localhost:3001/api

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build BFF image
        run: docker build -f packages/bff/Dockerfile -t rosmar-bff:ci .

      - name: Build Frontend image
        run: docker build -f packages/frontend/Dockerfile -t rosmar-frontend:ci .
