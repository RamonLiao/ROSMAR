services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: ${PG_PASSWORD:-crm_dev_password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  bff:
    build:
      context: .
      dockerfile: packages/bff/Dockerfile
    ports: ["3001:3001"]
    environment:
      DATABASE_URL: postgresql://crm:${PG_PASSWORD:-crm_dev_password}@postgres:5432/crm
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports: ["3000:3000"]
    environment:
      NEXT_PUBLIC_BFF_URL: http://localhost:3001
    depends_on:
      - bff

volumes:
  pg_data:
  redis_data:
